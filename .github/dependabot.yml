version: 2
updates:
  # Backend (Python, uv)
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      backend-deps:
        patterns:
          - "*"

  # Network / ML (Python, uv)
  - package-ecosystem: "uv"
    directory: "/network"
    schedule:
      interval: "weekly"
    groups:
      network-deps:
        patterns:
          - "*"

  # Frontend (JS, npm ecosystem — covers package.json / bun.lock)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-deps:
        patterns:
          - "*"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

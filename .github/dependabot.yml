version: 2
updates:
  # Python — single uv workspace at the repo root (backend, network, shared
  # all resolve into one root uv.lock, so Dependabot updates it in one place).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns:
          - "*"

  # Frontend (JS, npm ecosystem — covers package.json / bun.lock)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-deps:
        patterns:
          - "*"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

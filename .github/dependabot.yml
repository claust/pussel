version: 2
updates:
  # Python — single uv workspace at the repo root (backend, network, shared
  # all resolve into one root uv.lock, so Dependabot updates it in one place).
  #
  # Groups batch only minor/patch updates into one PR; MAJOR updates are left
  # ungrouped so each lands as its own PR and can be reviewed/migrated
  # deliberately (a grouped batch that bundled breaking majors is what made an
  # earlier frontend update unmergeable).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Frontend (JS, npm ecosystem — covers package.json / bun.lock).
  # bun.lock is regenerated by the dependabot-bun-lock workflow after each PR.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

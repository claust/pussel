name: Backend CI

on:
  push:
    branches: [main, release]
    paths:
      - "backend/**"
      - "shared/**"
      - "uv.lock"
      - "pyproject.toml"
      - ".dockerignore"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, release]
    paths:
      - "backend/**"
      - "shared/**"
      - "uv.lock"
      - "pyproject.toml"
      - ".dockerignore"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Lets Codecov fall back to tokenless OIDC upload when CODECOV_TOKEN
      # is unavailable; harmless when the token is present.
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        # Single uv workspace: sync the whole workspace from the repo root so
        # the one shared uv.lock stays authoritative for every member.
        run: uv sync --locked --all-extras

      - name: Run all checks
        run: |
          make check-backend
          make check-shared

      - name: Install tesseract
        # Powers the piece-count OCR (app/services/piece_count_estimator.py);
        # without it those tests skip and the estimator degrades to None.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr

      - name: Run tests
        working-directory: backend
        env:
          ENV_FILE: .env.test
        run: |
          cp .env.test .env
          uv run pytest -v --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          # Dependabot and fork PRs don't receive repository secrets, so the
          # token is empty and the upload against a protected branch fails.
          # Only treat upload errors as fatal when a token is actually present.
          fail_ci_if_error: ${{ secrets.CODECOV_TOKEN != '' }}

  # Deployment is pull-based on the server (backend/deploy/README.md):
  # a systemd timer there polls origin/main, rebuilds the image
  # natively, and restarts the stack. This job only proves the Dockerfile
  # still builds so a broken image can't reach main.
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Free runner disk space
        # The CUDA-flavored torch in uv.lock makes the image ~15 GB; drop the
        # runner's unused preinstalled toolchains so the build doesn't ENOSPC.
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: false

name: Network CI

on:
  push:
    branches: [ main, release ]
    paths:
      - 'network/**'
      - 'shared/**'
      - 'uv.lock'
      - 'pyproject.toml'
      - '.github/workflows/network-ci.yml'
  pull_request:
    branches: [ main, release ]
    paths:
      - 'network/**'
      - 'shared/**'
      - 'uv.lock'
      - 'pyproject.toml'
      - '.github/workflows/network-ci.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      # Single uv workspace: sync the whole workspace from the repo root so
      # the one shared uv.lock stays authoritative for every member.
      run: uv sync --locked --all-extras

    - name: Run all checks
      run: make check-network

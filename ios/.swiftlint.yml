# SwiftLint configuration for the Pussel iOS app.
# Run locally with `swiftlint` from the `ios/` directory (brew install swiftlint).
# CI runs `swiftlint lint --quiet --strict`, which promotes every warning to an
# error so any lint violation blocks the merge (not just error-level rules).

included:
  - Pussel
  - PusselTests

# The generated Xcode project and build output are gitignored, but exclude them
# defensively so a local lint run never walks into generated sources.
excluded:
  - Pussel.xcodeproj
  - .build
  - DerivedData

# Match the repo-wide 120-character line-length convention (see CLAUDE.md).
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

# SwiftUI view bodies and stores legitimately run long; keep these as warnings
# with generous ceilings so they inform without failing CI.
type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 80
  error: 150

identifier_name:
  # Allow short names common in SwiftUI/graphics code (x, y, id, to, dx, dy).
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - to
    - dx
    - dy

disabled_rules:
  - todo # TODO/FIXME comments are tracked elsewhere, not a lint gate.
  # Domain terms like "blacklist" (e.g. the barcode lookup's per-session miss
  # blacklist) are allowed; this project doesn't rename established technical
  # vocabulary.
  - inclusive_language
  # Formatting is owned by swift-format (`make format-ios`, Xcode's bundled
  # tool), so SwiftLint must not fight its output. swift-format puts the
  # opening brace on its own line when a function signature wraps, and adds
  # trailing commas to multi-line collection literals — both are deliberate
  # swift-format defaults that these two rules would otherwise flag.
  - opening_brace
  - trailing_comma

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - first_where
  - toggle_bool
